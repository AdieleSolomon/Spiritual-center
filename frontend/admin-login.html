<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="api-base-url" content="" />
    <title>Admin Login - Spiritual Center</title>
    <link
      rel="icon"
      type="image/png"
      href="./587-5875144_sda-church-logo-png-seventh-day-adventist-church.png" />
    <script src="./app-config.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet" />
    <style>
      html {
        -webkit-text-size-adjust: 100%;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Plus Jakarta Sans", "Segoe UI", sans-serif;
        background:
          radial-gradient(
            circle at 12% 18%,
            rgba(46, 182, 159, 0.18),
            transparent 38%
          ),
          radial-gradient(
            circle at 86% 12%,
            rgba(215, 169, 94, 0.16),
            transparent 35%
          ),
          linear-gradient(135deg, #050d18 0%, #081727 45%, #0a2032 100%);
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        color: #e2e8f0;
        overflow-x: hidden;
        overflow-y: auto;
      }

      .login-container {
        background: rgba(8, 20, 32, 0.9);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 24px 60px rgba(2, 8, 15, 0.45);
        width: 100%;
        max-width: 400px;
        padding: 40px;
        animation: slideUp 0.5s ease;
        backdrop-filter: blur(6px);
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .login-header {
        text-align: center;
        margin-bottom: 30px;
      }

      .login-icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        border-radius: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        color: #fff;
        background: linear-gradient(135deg, #2eb69f 0%, #1f8f7e 100%);
        box-shadow: 0 14px 30px rgba(31, 143, 126, 0.35);
      }

      .login-header h1 {
        font-size: 28px;
        color: #f4f7fb;
        margin-bottom: 10px;
        font-family: "Cormorant Garamond", serif;
        letter-spacing: 0.5px;
      }

      .login-header p {
        color: #b7c7d8;
        font-size: 14px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #c3d3e3;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        font-size: 14px;
        transition: border-color 0.3s;
        font-family: inherit;
        background: rgba(9, 24, 38, 0.8);
        color: #f1f5f9;
      }

      input[type="text"]::placeholder,
      input[type="email"]::placeholder,
      input[type="password"]::placeholder {
        color: #8ea5bb;
        opacity: 1;
      }

      input[type="text"]:focus,
      input[type="email"]:focus,
      input[type="password"]:focus {
        outline: none;
        border-color: #2eb69f;
        box-shadow: 0 0 0 3px rgba(46, 182, 159, 0.18);
      }

      .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
        font-size: 13px;
        color: #c3d3e3;
      }

      .remember-forgot label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 0;
        color: #c3d3e3;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: normal;
        text-transform: none;
      }

      .remember-forgot input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: #2eb69f;
      }

      .remember-forgot a {
        color: #2eb69f;
        text-decoration: none;
        transition: color 0.3s;
      }

      .remember-forgot a:hover {
        color: #d7a95e;
      }

      .login-btn {
        width: 100%;
        min-height: 48px;
        padding: 12px;
        background: linear-gradient(135deg, #2eb69f 0%, #1f8f7e 100%);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }

      .login-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 26px rgba(31, 143, 126, 0.4);
      }

      .login-btn:active {
        transform: translateY(0);
      }

      .login-btn.loading {
        opacity: 0.7;
        pointer-events: none;
      }

      .error-message {
        background: rgba(181, 61, 61, 0.18);
        color: #ffb4b4;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 20px;
        display: none;
        font-size: 14px;
        border-left: 4px solid #ef4444;
      }

      .error-message.show {
        display: block;
        animation: shake 0.5s;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-10px);
        }
        75% {
          transform: translateX(10px);
        }
      }

      .success-message {
        background: rgba(31, 127, 86, 0.18);
        color: #9ff0c8;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 20px;
        display: none;
        font-size: 14px;
        border-left: 4px solid #22c55e;
      }

      .success-message.show {
        display: block;
        animation: slideUp 0.5s;
      }

      .back-link {
        text-align: center;
        margin-top: 20px;
      }

      .back-link a {
        color: #8fe3d5;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: color 0.3s;
      }

      .back-link a:hover {
        color: #f0c782;
      }

      .loading-spinner {
        display: none;
        width: 20px;
        height: 20px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 10px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .login-btn span {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      @media (max-height: 760px) {
        body {
          align-items: flex-start;
        }
      }

      @media (max-width: 480px) {
        body {
          align-items: flex-start;
          padding: 14px 12px 24px;
        }

        .login-container {
          padding: 24px 16px;
          border-radius: 18px;
        }

        .login-header {
          margin-bottom: 24px;
        }

        .login-icon {
          width: 56px;
          height: 56px;
          margin-bottom: 14px;
          border-radius: 16px;
          font-size: 24px;
        }

        .login-header h1 {
          font-size: 24px;
          margin-bottom: 8px;
        }

        .login-header p,
        .back-link a,
        #toggleText {
          font-size: 13px;
        }

        .remember-forgot {
          flex-wrap: wrap;
          gap: 10px;
          align-items: flex-start;
          margin-bottom: 20px;
        }

        .back-link {
          margin-top: 18px;
        }

        #toggleText {
          line-height: 1.6;
        }
      }

      @media (max-width: 360px) {
        body {
          padding-inline: 10px;
        }

        .login-container {
          padding: 22px 14px;
        }

        .login-header h1 {
          font-size: 22px;
        }

        .login-btn {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-header">
        <div class="login-icon">
          <i class="fas fa-lock"></i>
        </div>
        <h1>Admin Portal</h1>
        <p id="headerSubtext">Spiritual Center Management</p>
      </div>

      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <form id="loginForm">
        <div id="registrationFields" style="display: none">
          <div class="form-group">
            <label for="regUsername">Username</label>
            <input
              type="text"
              id="regUsername"
              name="username"
              placeholder="Enter username"
              autocomplete="username" />
          </div>
        </div>

        <div class="form-group">
          <label for="email" id="emailLabel">Email or Username</label>
          <input
            type="text"
            id="email"
            name="email"
            placeholder="admin@example.com or admin username"
            required
            autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password" />
        </div>

        <div id="confirmPasswordField" style="display: none" class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Confirm your password"
            autocomplete="new-password" />
        </div>

        <div class="remember-forgot" id="rememberForgot">
          <label> <input type="checkbox" name="remember" /> Remember me </label>
        </div>

        <button type="submit" class="login-btn" id="submitBtn">
          <span>
            <div class="loading-spinner" id="spinner"></div>
            <span id="btnText">Login</span>
          </span>
        </button>
      </form>

      <div class="back-link">
        <p
          id="toggleText"
          style="margin-bottom: 10px; font-size: 14px; color: #b7c7d8">
          Don't have an admin account?
          <a href="#" id="toggleMode">Register here</a>
        </p>
        <a href="index.html">&larr; Back to Home</a>
      </div>
    </div>

    <script>
      const isLocalHost =
        window.location.hostname === "localhost" ||
        window.location.hostname === "127.0.0.1";
      const normalizeApiBase = (value) => {
        if (!value) return "";
        const trimmed = value.replace(/\/+$/, "");
        return /\/api$/i.test(trimmed) ? trimmed : `${trimmed}/api`;
      };
      const resolveConfiguredApiBase = (value) => {
        const normalized = normalizeApiBase(String(value || "").trim());
        if (!normalized || /your-railway-backend/i.test(normalized)) {
          return "";
        }
        return normalized;
      };
      const appConfigApiBase = resolveConfiguredApiBase(
        window.APP_CONFIG?.API_BASE,
      );
      const configuredApiBase = document
        .querySelector('meta[name="api-base-url"]')
        ?.getAttribute("content");
      const API_BASE = normalizeApiBase(
        appConfigApiBase ||
          resolveConfiguredApiBase(configuredApiBase) ||
          window.location.origin,
      );

      const loginForm = document.getElementById("loginForm");
      const errorMessage = document.getElementById("errorMessage");
      const successMessage = document.getElementById("successMessage");
      const spinner = document.getElementById("spinner");
      const btnText = document.getElementById("btnText");
      const loginBtn = document.getElementById("submitBtn");

      const toggleMode = document.getElementById("toggleMode");
      const registrationFields = document.getElementById("registrationFields");
      const confirmPasswordField = document.getElementById(
        "confirmPasswordField",
      );
      const emailLabel = document.getElementById("emailLabel");
      const headerSubtext = document.getElementById("headerSubtext");
      const rememberForgot = document.getElementById("rememberForgot");
      const toggleText = document.getElementById("toggleText");

      let isRegistrationMode = false;

      toggleMode.addEventListener("click", (e) => {
        e.preventDefault();
        isRegistrationMode = !isRegistrationMode;

        if (isRegistrationMode) {
          headerSubtext.textContent = "Request Admin Access";
          btnText.textContent = "Request Access";
          emailLabel.textContent = "Email Address";
          registrationFields.style.display = "block";
          confirmPasswordField.style.display = "block";
          rememberForgot.style.display = "none";
          toggleText.innerHTML =
            'Already have an account? <a href="#" id="toggleMode">Login here</a>';
          document.getElementById("email").type = "email";
          document.getElementById("regUsername").required = true;
          document.getElementById("confirmPassword").required = true;
        } else {
          headerSubtext.textContent = "Spiritual Center Management";
          btnText.textContent = "Login";
          emailLabel.textContent = "Email or Username";
          registrationFields.style.display = "none";
          confirmPasswordField.style.display = "none";
          rememberForgot.style.display = "flex";
          toggleText.innerHTML =
            'Don\'t have an admin account? <a href="#" id="toggleMode">Register here</a>';
          document.getElementById("email").type = "text";
          document.getElementById("regUsername").required = false;
          document.getElementById("confirmPassword").required = false;
        }

        // Re-attach listener because we replaced innerHTML
        document.getElementById("toggleMode").addEventListener("click", (e) => {
          e.preventDefault();
          toggleMode.click();
        });
      });

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        
        if (isRegistrationMode) {
          const username = document.getElementById("regUsername").value.trim();
          const confirmPassword = document.getElementById("confirmPassword").value;

          if (!username || !email || !password || !confirmPassword) {
            showError("Please fill in all fields");
            return;
          }

          if (password !== confirmPassword) {
            showError("Passwords do not match");
            return;
          }

          // Show loading state
          spinner.style.display = "inline-block";
          btnText.textContent = "Registering...";
          loginBtn.disabled = true;

          try {
            const response = await fetch(`${API_BASE}/auth/register`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ 
                username, 
                email, 
                password, 
                confirmPassword,
                role: "admin" 
              }),
            });

            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.error || "Registration failed");
            }

            showSuccess("Registration submitted! The Super Admin must approve your admin access before you can log in.");
            
            // Switch back to login mode
            setTimeout(() => {
              toggleMode.click();
              successMessage.classList.remove("show");
            }, 5000);

          } catch (error) { 
            showError(error.message || "An error occurred. Please try again.");
          } finally {
            spinner.style.display = "none";
            btnText.textContent = "Request Access";
            loginBtn.disabled = false;
          }

        } else {
          // LOGIN MODE
          const remember = document.querySelector('input[name="remember"]').checked;

          if (!email || !password) {
            showError("Please fill in all fields");
            return;
          }

          // Show loading state
          spinner.style.display = "inline-block";
          btnText.textContent = "Logging in...";
          loginBtn.disabled = true;

          try {
            const response = await fetch(`${API_BASE}/auth/login`, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ email, password }),
            });

            const data = await response.json();

            if (!response.ok) {
              throw new Error(data.error || "Login failed");
            }

            // Check if user is admin or super_admin
            const user = data.user;
            const normalizedUserEmail = String(user.email || "")
              .trim()
              .toLowerCase();
            const isSuperAdmin =
              normalizedUserEmail === "admin@spiritualcenter.com" ||
              user.role === "super_admin";
            
            if (user.role !== "admin" && !isSuperAdmin) {
              throw new Error("You do not have admin access");
            }

            if (!user.is_approved && !isSuperAdmin) {
              throw new Error("Your admin account is pending approval by a Super Admin.");
            }

            // Store token and user info
            localStorage.setItem("adminToken", data.token);
            localStorage.setItem("authToken", data.token);
            localStorage.setItem("adminEmail", user.email);
            localStorage.setItem("adminUsername", user.username);
            localStorage.setItem("adminRole", user.role);
            localStorage.setItem("isSuperAdmin", isSuperAdmin);

            if (remember) {
              localStorage.setItem("rememberEmail", email);
            }

            showSuccess("Login successful! Redirecting...");

            // Redirect to admin panel
            setTimeout(() => {
              window.location.href = "admin-dashboard.html";
            }, 1500);
          } catch (error) {
            if (error?.name === "TypeError") {
              showError(`Unable to reach the backend at ${API_BASE}.`);
            } else {
              showError(error.message || "An error occurred. Please try again.");
            }
          } finally {
            spinner.style.display = "none";
            btnText.textContent = "Login";
            loginBtn.disabled = false;
          }
        }
      });

      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.classList.add("show");
        successMessage.classList.remove("show");
        setTimeout(() => {
          errorMessage.classList.remove("show");
        }, 5000);
      }

      function showSuccess(message) {
        successMessage.textContent = message;
        successMessage.classList.add("show");
        errorMessage.classList.remove("show");
      }

      // Check if user is already logged in
      window.addEventListener("load", () => {
        const token = localStorage.getItem("adminToken");
        if (token) {
          window.location.href = "admin-dashboard.html";
        }

        // Auto-fill email if remembered
        const rememberEmail = localStorage.getItem("rememberEmail");
        if (rememberEmail) {
          document.getElementById("email").value = rememberEmail;
          document.querySelector('input[name="remember"]').checked = true;
        }
      });
    </script>
  </body>
</html>
